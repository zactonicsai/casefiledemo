<style>
  :root {
    color-scheme: light;
    --bg:         #f5f3ea;
    --bg-alt:     #faf8f1;
    --surface:    #ffffff;
    --text:       #1c1b17;
    --text-muted: #6b695f;
    --text-faint: #bcbab3;
    --border:     #e3dfce;
    --border-strong: #d9d5c3;
    --accent:     #c7a35a;
    --sidebar-bg: #111110;
    --sidebar-fg: #f5f3ea;
    --sidebar-muted: #bcbab3;
    --ink-50:     #f8f7f4;
    --ink-100:    #eeece3;
    --ink-200:    #d9d5c3;
    --classification-bg: #fbe9e7;
    --classification-fg: #a5332a;
    --classification-border: #a5332a;
    --grain-opacity: 0.6;
    --font-scale: 1;
  }
  html.dark {
    color-scheme: dark;
    --bg:         #0e0d0b;
    --bg-alt:     #171612;
    --surface:    #1a1916;
    --text:       #ede8d8;
    --text-muted: #968f7e;
    --text-faint: #5a5648;
    --border:     #2a2620;
    --border-strong: #3a3528;
    --accent:     #d4b370;
    --sidebar-bg: #050504;
    --sidebar-fg: #ede8d8;
    --sidebar-muted: #968f7e;
    --ink-50:     #1f1d18;
    --ink-100:    #242118;
    --ink-200:    #2a2620;
    --classification-bg: #2a1210;
    --classification-fg: #e8948a;
    --classification-border: #8a2620;
    --grain-opacity: 0.25;
  }
  html { font-size: calc(16px * var(--font-scale)); }
  html, body { background: var(--bg); color: var(--text); }

  /* subtle paper grain */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: multiply;
    opacity: var(--grain-opacity);
  }
  html.dark body::before {
    background-image:
      radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.015) 1px, transparent 1px);
    mix-blend-mode: screen;
  }
  #app > * { position: relative; z-index: 1; }

  .num, .mono { font-variant-numeric: tabular-nums; }

  .classbanner {
    font-family:'JetBrains Mono',monospace; letter-spacing:0.3em;
    text-align:center; font-weight:700; font-size:11px;
    padding:6px 8px; color:var(--classification-fg); background:var(--classification-bg);
    border-top:1px solid var(--classification-border); border-bottom:1px solid var(--classification-border);
  }

  .stamp {
    font-family:'JetBrains Mono',monospace; font-weight:700; letter-spacing:0.15em;
    border:2px solid currentColor; padding:2px 8px; border-radius:2px;
    display:inline-flex; align-items:center; gap:6px;
    transform: rotate(-1.5deg); text-transform:uppercase; font-size:11px;
  }
  .stamp-red   { color:#a5332a; background:rgba(165,51,42,0.10); }
  .stamp-amber { color:#a16207; background:rgba(161,98,7,0.10); }
  .stamp-green { color:#2f6f3a; background:rgba(47,111,58,0.10); }
  .stamp-blue  { color:#1a3a6b; background:rgba(26,58,107,0.10); }
  .stamp-grey  { color:var(--text-muted); background:rgba(75,74,70,0.10); }
  html.dark .stamp-red   { color:#e8948a; background:rgba(232,148,138,0.12); }
  html.dark .stamp-amber { color:#e0b863; background:rgba(224,184,99,0.12); }
  html.dark .stamp-green { color:#7bb885; background:rgba(123,184,133,0.12); }
  html.dark .stamp-blue  { color:#7ba3d4; background:rgba(123,163,212,0.12); }

  .badge {
    display:inline-flex; align-items:center; gap:4px;
    font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:0.1em;
    font-weight:600; text-transform:uppercase;
    padding:2px 8px; border-radius:2px; white-space:nowrap;
  }
  .status-DRAFT            { background:#e8e4d4; color:#45443e; }
  .status-PENDING_APPROVAL { background:#fbe9c5; color:#7a4f0b; }
  .status-OPEN             { background:#d6e9d6; color:#2f6f3a; }
  .status-SUSPENDED        { background:#f7d7d3; color:#8f2b22; }
  .status-CLOSURE_REVIEW   { background:#d4def5; color:#22407a; }
  .status-CLOSED           { background:#e0ddf3; color:#3a327a; }
  .status-ARCHIVED         { background:#e5e4de; color:#4b4a46; }
  html.dark .status-DRAFT            { background:#2a2620; color:#c2bda8; }
  html.dark .status-PENDING_APPROVAL { background:#3d2e0f; color:#e0b863; }
  html.dark .status-OPEN             { background:#1e3524; color:#7bb885; }
  html.dark .status-SUSPENDED        { background:#3d1f1b; color:#e8948a; }
  html.dark .status-CLOSURE_REVIEW   { background:#1f2a42; color:#7ba3d4; }
  html.dark .status-CLOSED           { background:#272240; color:#a4a0d0; }
  html.dark .status-ARCHIVED         { background:#2a2620; color:#968f7e; }

  .pstat-UPLOADED      { background:#e8e4d4; color:#45443e; }
  .pstat-VIRUS_SCANNING{ background:#f7d7d3; color:#8f2b22; }
  .pstat-CONVERTING    { background:#fbe9c5; color:#7a4f0b; }
  .pstat-OCR_PENDING   { background:#fde9c2; color:#7a4f0b; }
  .pstat-OCR_COMPLETE  { background:#d4def5; color:#22407a; }
  .pstat-INDEXED       { background:#d6e9d6; color:#2f6f3a; }
  .pstat-FAILED        { background:#f7c7c1; color:#8f2b22; }
  html.dark .pstat-UPLOADED      { background:#2a2620; color:#c2bda8; }
  html.dark .pstat-VIRUS_SCANNING{ background:#3d1f1b; color:#e8948a; }
  html.dark .pstat-CONVERTING    { background:#3d2e0f; color:#e0b863; }
  html.dark .pstat-OCR_PENDING   { background:#3d2e0f; color:#e0b863; }
  html.dark .pstat-OCR_COMPLETE  { background:#1f2a42; color:#7ba3d4; }
  html.dark .pstat-INDEXED       { background:#1e3524; color:#7bb885; }
  html.dark .pstat-FAILED        { background:#3d1f1b; color:#e8948a; }

  .no-rotate { transform: none !important; }

  .nav-link { position:relative; padding:10px 20px; color:var(--sidebar-muted); font-size:13.5px; letter-spacing:0.02em; display:flex; align-items:center; gap:10px; border-left:2px solid transparent; transition: all 0.15s; }
  .nav-link:hover { color:var(--sidebar-fg); background: rgba(255,255,255,0.03); }
  .nav-link.active { color:var(--sidebar-fg); border-left-color:var(--accent); background: rgba(199,163,90,0.08); }

  .field {
    display:block; width:100%; border:1px solid var(--border-strong); background:var(--surface);
    color: var(--text); padding:9px 12px; border-radius:3px; font-size:14px;
  }
  .field:focus { outline:none; border-color:#2b4b8a; box-shadow:0 0 0 3px rgba(43,75,138,0.15); }
  html.dark .field:focus { border-color:#7ba3d4; box-shadow:0 0 0 3px rgba(123,163,212,0.2); }
  .field-sm { padding:6px 10px; font-size:13px; }
  label.lbl {
    display:block; font-family:'JetBrains Mono',monospace; font-size:10.5px;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted);
    margin-bottom:5px; font-weight:500;
  }

  .btn      { display:inline-flex; align-items:center; gap:8px; padding:9px 18px; font-size:13.5px; font-weight:500; letter-spacing:0.01em; border-radius:3px; transition:all 0.15s; cursor:pointer; border:1px solid transparent; white-space:nowrap; }
  .btn-sm   { padding:5px 12px; font-size:12px; }
  .btn-pri  { background:var(--text); color:var(--bg); }
  .btn-pri:hover { opacity: 0.88; }
  .btn-acc  { background:var(--accent); color:#1c1b17; font-weight:600; }
  .btn-acc:hover { filter: brightness(0.93); }
  .btn-out  { background:transparent; color:var(--text); border-color:var(--text); }
  .btn-out:hover { background:var(--text); color:var(--bg); }
  .btn-ghost{ background:transparent; color:var(--text-muted); }
  .btn-ghost:hover { background:rgba(128,128,128,0.1); color:var(--text); }
  .btn-danger { background:#a5332a; color:#fff; }
  .btn-danger:hover { background:#8a2620; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:4px; box-shadow: 0 1px 2px rgba(17,17,16,0.04); }
  html.dark .card { box-shadow: 0 1px 2px rgba(0,0,0,0.3); }

  .casenum { font-family:'JetBrains Mono',monospace; font-weight:700; letter-spacing:0.05em; font-variant-numeric:tabular-nums; }

  table.dossier { width:100%; border-collapse:separate; border-spacing:0; }
  table.dossier th {
    font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--text-muted); text-align:left; padding:10px 12px;
    border-bottom:1px solid var(--border-strong); background:var(--bg-alt); font-weight:600;
  }
  table.dossier td { padding:12px; border-bottom:1px solid var(--ink-100); font-size:14px; vertical-align:top; color: var(--text); }
  table.dossier tbody tr:hover { background:var(--bg-alt); cursor:pointer; }
  table.dossier tbody tr:hover td.no-hover { background:transparent; }

  @keyframes stamp-in { 0%{ transform: rotate(-15deg) scale(2); opacity:0; } 60%{ transform: rotate(-2deg) scale(1.1); opacity:1; } 100%{ transform: rotate(-1.5deg) scale(1); opacity:1; } }
  .stamp-in { animation: stamp-in 0.4s ease-out; }
  @keyframes fade-up { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .fade-up { animation: fade-up 0.3s ease-out both; }
  @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(43,75,138,0.4);} 70%{box-shadow:0 0 0 10px rgba(43,75,138,0);} 100%{box-shadow:0 0 0 0 rgba(43,75,138,0);} }
  .pulse { animation: pulse-ring 1.5s ease-out infinite; }

  #toasts { position:fixed; top:20px; right:20px; z-index:100; display:flex; flex-direction:column; gap:8px; max-width: calc(100vw - 40px); }
  .toast { background:#1c1b17; color:#f5f3ea; padding:12px 18px; border-radius:3px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,0.25); border-left:3px solid #c7a35a; max-width:360px; animation: fade-up 0.25s ease-out; }
  .toast.error { border-left-color:#a5332a; }
  .toast.success { border-left-color:#2f6f3a; }
  html.dark .toast { background: #ede8d8; color: #1c1b17; }

  .modal-backdrop { position:fixed; inset:0; background:rgba(17,17,16,0.55); z-index:80; display:flex; align-items:center; justify-content:center; padding:20px; }
  html.dark .modal-backdrop { background: rgba(0,0,0,0.75); }

  .upload-file::file-selector-button {
    margin-right: 12px; padding: 8px 16px; border: none; border-radius: 3px;
    background: var(--text); color: var(--bg); font-weight: 500;
    font-family: inherit; cursor: pointer;
  }
  .upload-file::file-selector-button:hover { opacity: 0.88; }
  .modal { background:var(--bg); border:1px solid var(--border-strong); border-radius:4px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }

  mark { background:#fde68a; color:inherit; padding:0 2px; border-radius:1px; }
  html.dark mark { background: #7a5e15; color: #fde68a; }

  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text-faint); }

  .login-bg {
    background:
      radial-gradient(ellipse at top left, rgba(199,163,90,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(43,75,138,0.08) 0%, transparent 50%),
      #111110;
  }
  .seal-ring {
    width:110px; height:110px; border:1px solid #c7a35a; border-radius:50%;
    display:flex; align-items:center; justify-content:center; position:relative;
    margin: 0 auto;
  }
  .seal-ring::before {
    content:''; position:absolute; inset:6px; border:1px dashed #c7a35a; border-radius:50%;
  }
  .seal-inner { font-family:'Newsreader', serif; font-size:11px; letter-spacing:0.4em; color:#c7a35a; font-weight:600; }

  /* ── Mobile / sidebar ── */
  .sidebar {
    width: 240px; background: var(--sidebar-bg); color: var(--sidebar-fg);
    flex-shrink: 0; display: flex; flex-direction: column;
    transition: transform 0.22s ease;
  }
  .mobile-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 50;
  }
  @media (max-width: 900px) {
    .sidebar {
      position: fixed; inset: 0 auto 0 0; z-index: 60; transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); box-shadow: 10px 0 40px rgba(0,0,0,0.3); }
    .mobile-overlay.open { display: block; }
    .content-pad { padding: 20px !important; }
    .topbar-title { display: none; }
    .kbd-hint { display: none; }
    .meta-grid-m { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 640px) {
    .hide-sm { display: none !important; }
    .stat-tile-sm { padding: 14px !important; }
    .stat-tile-sm .font-display { font-size: 1.75rem !important; }
    .content-pad { padding: 14px !important; }
    .table-wrap { overflow-x: auto; }
    .table-wrap table.dossier { min-width: 720px; }
    h1.page-h1 { font-size: 1.85rem !important; }
    .modal { max-height: 95vh; }
  }
  .hamburger { display: none; }
  @media (max-width: 900px) {
    .hamburger { display: inline-flex; }
  }

  /* ── OpenLayers map overrides for dark mode ── */
  .ol-zoom {
    top: auto; bottom: 12px; right: 12px; left: auto;
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 3px;
  }
  .ol-zoom button {
    background: var(--surface); color: var(--text); font-family: 'JetBrains Mono', monospace;
    border: none; border-bottom: 1px solid var(--border-strong); width: 30px; height: 30px;
  }
  .ol-zoom button:last-child { border-bottom: none; }
  .ol-zoom button:hover, .ol-zoom button:focus { background: var(--bg-alt); }
  html.dark .ol-tile-layer canvas { filter: brightness(0.7) contrast(1.15) hue-rotate(180deg) invert(0.92); }
  .ol-attribution { background: rgba(255,255,255,0.8); font-size: 10px; }
  html.dark .ol-attribution { background: rgba(0,0,0,0.6); color: var(--text); }
  html.dark .ol-attribution a { color: var(--accent); }

  .map-popup {
    position: absolute; background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 3px; padding: 12px; min-width: 240px; max-width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25); transform: translate(-50%, calc(-100% - 16px));
    pointer-events: auto; color: var(--text);
  }
  .map-popup::after {
    content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent;
    border-top: 8px solid var(--surface);
  }
  .map-popup::before {
    content: ''; position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent;
    border-top: 9px solid var(--border-strong);
  }
  .map-crosshair { cursor: crosshair !important; }

  .theme-btn {
    padding: 6px 8px; border: 1px solid var(--border-strong); border-radius: 3px;
    background: var(--surface); color: var(--text); display: inline-flex; align-items: center;
    gap: 4px; cursor: pointer; font-family:'JetBrains Mono', monospace; font-size: 11px;
  }
  .theme-btn:hover { background: var(--bg-alt); }

  /* dark invert for OSM tiles kept subtle */
  html.dark .ol-viewport { background: #0a0a08; }
</style>
</head>

<script>
const LS = {
  USERS:'sentinel.users', CASES:'sentinel.cases', DOCS:'sentinel.docs',
  AUDIT:'sentinel.audit', SESSION:'sentinel.session'
};

function loadOrSeed(key, seed) {
  const raw = localStorage.getItem(key);
  if (raw) {
    try { return JSON.parse(raw); } catch { /* fallthrough */ }
  }
  localStorage.setItem(key, JSON.stringify(seed));
  return structuredClone(seed);
}

const Store = {
  users:  loadOrSeed(LS.USERS,  SEED_USERS),
  cases:  loadOrSeed(LS.CASES,  SEED_CASES),
  docs:   loadOrSeed(LS.DOCS,   SEED_DOCS),
  audit:  loadOrSeed(LS.AUDIT,  SEED_AUDIT),
  session: (() => { try { return JSON.parse(localStorage.getItem(LS.SESSION)) || null; } catch { return null; } })(),

  save() {
    localStorage.setItem(LS.USERS, JSON.stringify(this.users));
    localStorage.setItem(LS.CASES, JSON.stringify(this.cases));
    localStorage.setItem(LS.DOCS,  JSON.stringify(this.docs));
    localStorage.setItem(LS.AUDIT, JSON.stringify(this.audit));
    if (this.session) localStorage.setItem(LS.SESSION, JSON.stringify(this.session));
    else              localStorage.removeItem(LS.SESSION);
  },

  reset() {
    [LS.USERS,LS.CASES,LS.DOCS,LS.AUDIT,LS.SESSION].forEach(k => localStorage.removeItem(k));
    location.reload();
  },

  currentUser() {
    if (!this.session) return null;
    return this.users.find(u => u.username === this.session.username) || null;
  },

  login(username) {
    const u = this.users.find(x => x.username === username);
    if (!u) throw new Error('User not found');
    this.session = { username:u.username, loginAt: new Date().toISOString() };
    this.save();
  },

  logout() { this.session = null; this.save(); },

  hasRole(role) {
    const u = this.currentUser(); if (!u) return false;
    const norm = role.startsWith('ROLE_') ? role : 'ROLE_' + role;
    return u.roles.includes(norm);
  },

  hasAnyRole(...roles) { return roles.some(r => this.hasRole(r)); }
};

// ── UI preferences (theme + font scale + mobile nav) ──────────────
const Prefs = {
  theme: localStorage.getItem('sentinel.theme') || 'light',
  fontScale: parseFloat(localStorage.getItem('sentinel.fontScale') || '1'),
  mobileNavOpen: false,

  apply() {
    document.documentElement.classList.toggle('dark', this.theme === 'dark');
    document.documentElement.style.setProperty('--font-scale', this.fontScale);
  },
  setTheme(t) {
    this.theme = t;
    localStorage.setItem('sentinel.theme', t);
    this.apply();
    render();
    // resize map if present
    if (window.__mapInstance) setTimeout(() => window.__mapInstance.updateSize(), 50);
  },
  toggleTheme() { this.setTheme(this.theme === 'dark' ? 'light' : 'dark'); },
  setFontScale(s) {
    this.fontScale = Math.max(0.8, Math.min(1.4, Math.round(s * 100) / 100));
    localStorage.setItem('sentinel.fontScale', String(this.fontScale));
    this.apply();
    render();
  },
  bumpFont(delta) { this.setFontScale(this.fontScale + delta); },
  resetFont()    { this.setFontScale(1); },
  toggleMobileNav() {
    this.mobileNavOpen = !this.mobileNavOpen;
    document.querySelector('.sidebar')?.classList.toggle('open', this.mobileNavOpen);
    document.querySelector('.mobile-overlay')?.classList.toggle('open', this.mobileNavOpen);
  },
  closeMobileNav() {
    this.mobileNavOpen = false;
    document.querySelector('.sidebar')?.classList.remove('open');
    document.querySelector('.mobile-overlay')?.classList.remove('open');
  }
};
Prefs.apply();

// ── helpers ────────────────────────────────────────────────────────
function uuid() {
  return 'id-' + Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6);
}

function audit(action, entityType, entityId, caseNumber, outcome, details = {}) {
  const u = Store.currentUser();
  Store.audit.unshift({
    id: uuid(),
    occurredAt: new Date().toISOString(),
    actorUsername: u?.username || 'system',
    actorRoles: (u?.roles || []).join(','),
    action, entityType, entityId, caseNumber, outcome, details
  });
  Store.save();
}

function getCaseDocs(caseId) {
  return Store.docs.filter(d => d.caseId === caseId).sort((a,b) => a.serialIndex - b.serialIndex);
}

function nextSerial(classCode, office) {
  const existing = Store.cases
    .filter(c => c.classificationCode === classCode && c.originatingOffice === office)
    .map(c => c.serialNumber);
  const max = existing.length ? Math.max(...existing) : 0;
  return max + 1;
}

function dateFmt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { dateStyle:'medium', timeStyle:'short' });
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1)    return 'just now';
  if (m < 60)   return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24)   return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 30)   return d + 'd ago';
  const mo = Math.floor(d / 30);
  if (mo < 12)  return mo + 'mo ago';
  return Math.floor(mo / 12) + 'y ago';
}

function fmtBytes(n) {
  if (n == null) return '—';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function toast(msg, kind='default') {
  const el = document.createElement('div');
  el.className = 'toast ' + (kind === 'error' ? 'error' : kind === 'success' ? 'success' : '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
}
</script>

<script>
const Router = {
  route: 'dashboard',
  params: {},
  go(route, params = {}) {
    this.route = route;
    this.params = params;
    const hash = route + (Object.keys(params).length ? '?' + new URLSearchParams(params).toString() : '');
    history.replaceState(null, '', '#' + hash);
    render();
    window.scrollTo({ top:0, behavior:'instant' });
  },
  fromHash() {
    const h = location.hash.slice(1) || 'dashboard';
    const [route, qs] = h.split('?');
    const params = Object.fromEntries(new URLSearchParams(qs || ''));
    this.route = route;
    this.params = params;
  }
};
window.addEventListener('hashchange', () => { Router.fromHash(); render(); });
</script>

function previewCaseNumber() {
  const f = document.getElementById('new-case-form');
  if (!f) return;
  const cls = f.classification.value;
  const off = f.office.value;
  const preview = document.getElementById('case-number-preview');
  if (cls && off) {
    const serial = nextSerial(cls, off);
    preview.textContent = `${cls}-${off}-${String(serial).padStart(5,'0')}`;
  } else {
    preview.textContent = '———-——-——————';
  }
}

function submitNewCase(event) {
  event.preventDefault();
  const f = event.target;
  const classCode = f.classification.value;
  const office = f.office.value;
  const serial = nextSerial(classCode, office);
  const tags = f.tags.value.split(',').map(t => t.trim()).filter(Boolean);
  const lat = parseFloat(f.lat.value) || null;
  const lon = parseFloat(f.lon.value) || null;
  const location = f.location.value.trim() || null;

  const newCase = {
    id: uuid(),
    caseNumber: `${classCode}-${office}-${String(serial).padStart(5,'0')}`,
    classificationCode: classCode,
    originatingOffice: office,
    serialNumber: serial,
    title: f.title.value.trim(),
    synopsis: f.synopsis.value.trim() || undefined,
    status: 'DRAFT',
    tags,
    ...(lat && lon ? { lat, lon } : {}),
    ...(location ? { location } : {}),
    assignedAgentId: Store.currentUser().username,
    createdAt: new Date().toISOString(),
    createdBy: Store.currentUser().username,
    updatedAt: new Date().toISOString(),
    workflowId: 'case-' + uuid()
  };
  Store.cases.unshift(newCase);
  audit('CREATE_CASE', 'Case', newCase.id, newCase.caseNumber, 'DRAFT created', { title: newCase.title });
  Store.save();
  toast(`Case ${newCase.caseNumber} created`, 'success');
  Router.go('case', { id: newCase.id });
}

function statusStampClass(status) {
  switch (status) {
    case 'DRAFT':            return 'stamp-grey';
    case 'PENDING_APPROVAL': return 'stamp-amber';
    case 'OPEN':             return 'stamp-green';
    case 'SUSPENDED':        return 'stamp-red';
    case 'CLOSURE_REVIEW':   return 'stamp-blue';
    case 'CLOSED':
    case 'ARCHIVED':         return 'stamp-blue';
    default:                 return 'stamp-grey';
  }
}

// Case workflow actions (simulated Temporal signals)
function doCaseAction(caseId, actionKey) {
  const c = Store.cases.find(x => x.id === caseId);
  if (!c) return;
  const comments = document.getElementById('action-comments')?.value || '';
  const now = new Date().toISOString();

  const transitions = {
    'submit':            { to:'PENDING_APPROVAL', action:'SUBMIT_FOR_APPROVAL', outcome:'pending approval' },
    'approve':           { to:'OPEN',             action:'APPROVE_CASE',        outcome:'approved',         setOpenedAt:true },
    'reject':            { to:'DRAFT',            action:'REJECT_CASE',         outcome:'rejected' },
    'suspend':           { to:'SUSPENDED',        action:'SUSPEND_CASE',        outcome:'suspended' },
    'resume':            { to:'OPEN',             action:'RESUME_CASE',         outcome:'resumed' },
    'request-closure':   { to:'CLOSURE_REVIEW',   action:'REQUEST_CLOSURE',     outcome:'closure requested' },
    'confirm-closure':   { to:'CLOSED',           action:'CONFIRM_CLOSURE',     outcome:'closed',           setClosedAt:true, requireReason:true },
    'return-open':       { to:'OPEN',             action:'RETURN_TO_OPEN',      outcome:'returned to OPEN' }
  };

  const t = transitions[actionKey];
  if (!t) return;

  if (t.requireReason && !comments.trim()) {
    toast('Please provide a closure reason in the comments field.', 'error');
    return;
  }

  c.status = t.to;
  c.updatedAt = now;
  if (t.setOpenedAt && !c.openedAt) c.openedAt = now;
  if (t.setClosedAt) { c.closedAt = now; c.closureReason = comments; }

  audit(t.action, 'Case', c.id, c.caseNumber, t.outcome, { comments });
  Store.save();
  toast(`Case ${c.caseNumber} → ${t.to.replace(/_/g,' ')}`, 'success');
  render();
}

function doUpload(event) {
  event.preventDefault();
  const f = event.target;
  const c = Store.cases.find(x => x.id === uploadingCaseId);
  if (!c) return;

  const file = f.file.files[0];
  const existing = getCaseDocs(c.id);
  const nextIdx = existing.length + 1;

  const doc = {
    id: uuid(),
    caseId: c.id,
    serialIndex: nextIdx,
    documentType: f.docType.value,
    title: f.title.value.trim(),
    description: f.description.value.trim() || undefined,
    originalFilename: file?.name,
    contentType: file?.type || 'application/octet-stream',
    sizeBytes: file?.size || 0,
    processingStatus: 'UPLOADED',
    uploadedAt: new Date().toISOString(),
    uploadedBy: Store.currentUser().username,
    sha256: Array.from({length:64}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join(''),
    extractedText: ''
  };
  Store.docs.push(doc);
  c.updatedAt = doc.uploadedAt;
  audit('UPLOAD_DOCUMENT', 'SerialDocument', doc.id, c.caseNumber, `uploaded serial #${nextIdx}`, { filename: doc.originalFilename, type: doc.documentType });
  Store.save();
  closeModal();
  toast(`Serial #${nextIdx} filed — pipeline started`, 'success');

  // Simulate the Temporal ingest workflow stages
  simulatePipeline(doc.id);
  render();
}

function simulatePipeline(docId) {
  const stages = ['VIRUS_SCANNING', 'CONVERTING', 'OCR_PENDING', 'OCR_COMPLETE', 'INDEXED'];
  let i = 0;
  const step = () => {
    const d = Store.docs.find(x => x.id === docId);
    if (!d) return;
    d.processingStatus = stages[i];
    Store.save();
    // Re-render if we're still looking at the case detail of this doc
    if (Router.route === 'case' && Router.params.id === d.caseId) render();
    i++;
    if (i < stages.length) {
      setTimeout(step, 800 + Math.random() * 700);
    } else {
      toast(`Document indexed (${stages.length} stages complete)`, 'success');
    }
  };
  setTimeout(step, 600);
}

function highlight(text, q) {
  if (!q) return esc(text);
  const escQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escQ})`, 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

function snippet(text, q, len = 200) {
  if (!text) return '';
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q.toLowerCase());
  if (idx < 0) return text.slice(0, len);
  const start = Math.max(0, idx - 60);
  return text.slice(start, start + len);
}

function quickSearch(q) {
  document.getElementById('search-q').value = q;
  searchState.q = q;
  searchState.classificationFilter = '';
  searchState.typeFilter = '';
  runSearchInner(q);
}

function runSearch(event) {
  event.preventDefault();
  const q = document.getElementById('search-q').value.trim();
  if (!q) return;
  searchState.q = q;
  runSearchInner(q);
}

function runSearchInner(q) {
  const start = performance.now();
  const qLower = q.toLowerCase();

  let hits = Store.docs
    .map(d => {
      const c = Store.cases.find(x => x.id === d.caseId);
      let score = 0;
      const title = (d.title || '').toLowerCase();
      const desc  = (d.description || '').toLowerCase();
      const body  = (d.extractedText || '').toLowerCase();
      const cNum  = (c?.caseNumber || '').toLowerCase();
      const cTitle= (c?.title || '').toLowerCase();
      if (title.includes(qLower)) score += 3;
      if (cTitle.includes(qLower)) score += 2;
      if (desc.includes(qLower))  score += 2;
      if (body.includes(qLower))  score += 1;
      if (cNum.includes(qLower))  score += 4;
      if (d.documentType.toLowerCase().includes(qLower)) score += 1.5;
      return { id:d.id, caseId:d.caseId, score };
    })
    .filter(h => h.score > 0);

  // apply facet filters
  if (searchState.classificationFilter) {
    hits = hits.filter(h => {
      const c = Store.cases.find(x => x.id === h.caseId);
      return c?.classificationCode === searchState.classificationFilter;
    });
  }
  if (searchState.typeFilter) {
    hits = hits.filter(h => Store.docs.find(x => x.id === h.id)?.documentType === searchState.typeFilter);
  }
  hits.sort((a,b) => b.score - a.score);

  // facets (computed from full hit set before facet filtering for demo simplicity — compute from filtered here)
  const classFacets = facetCount(hits, h => Store.cases.find(c => c.id === h.caseId)?.classificationCode);
  const typeFacets  = facetCount(hits, h => Store.docs.find(d => d.id === h.id)?.documentType);

  searchState.results = {
    total: hits.length,
    hits: hits.slice(0, 25),
    classFacets, typeFacets,
    tookMs: Math.max(1, Math.round(performance.now() - start) + Math.floor(Math.random() * 8))
  };
  render();
}

function facetCount(items, extractor) {
  const map = new Map();
  for (const i of items) {
    const k = extractor(i);
    if (!k) continue;
    map.set(k, (map.get(k) || 0) + 1);
  }
  return [...map.entries()]
    .map(([key, count]) => ({ key, count }))
    .sort((a,b) => b.count - a.count);
}

function toggleFacet(key, value) {
  searchState[key] = searchState[key] === value ? '' : value;
  runSearchInner(searchState.q);
}

function stateMachineSvg(counts) {
  const nodes = [
    { id:'DRAFT',            x: 60, y: 50,  w:100, h:38 },
    { id:'PENDING_APPROVAL', x: 60, y: 130, w:100, h:38 },
    { id:'OPEN',             x: 60, y: 210, w:100, h:38 },
    { id:'SUSPENDED',        x: 220,y: 210, w:100, h:38 },
    { id:'CLOSURE_REVIEW',   x: 220,y: 130, w:100, h:38 },
    { id:'CLOSED',           x: 220,y: 50,  w:100, h:38 }
  ];
  const edges = [
    ['DRAFT','PENDING_APPROVAL','submit'],
    ['PENDING_APPROVAL','OPEN','approve'],
    ['PENDING_APPROVAL','DRAFT','reject'],
    ['OPEN','SUSPENDED','suspend'],
    ['SUSPENDED','OPEN','resume'],
    ['OPEN','CLOSURE_REVIEW','req. closure'],
    ['CLOSURE_REVIEW','CLOSED','confirm']
  ];

  const nMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  const nodeSvg = nodes.map(n => {
    const c = counts[n.id] || 0;
    const active = c > 0;
    const fill = active ? '#1c1b17' : '#f5f3ea';
    const stroke = active ? '#1c1b17' : '#d9d5c3';
    const text = active ? '#f5f3ea' : '#6b695f';
    return `
      <g>
        <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="3"
              fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
        <text x="${n.x + n.w/2}" y="${n.y + 17}" text-anchor="middle"
              font-family="JetBrains Mono" font-size="10" font-weight="700"
              letter-spacing="1.2" fill="${text}">${n.id.replace(/_/g,' ')}</text>
        <text x="${n.x + n.w/2}" y="${n.y + 31}" text-anchor="middle"
              font-family="Newsreader" font-size="13" font-weight="600" fill="${active ? '#c7a35a' : '#bcbab3'}">${c}</text>
      </g>
    `;
  }).join('');

  const edgeSvg = edges.map(([a,b,label]) => {
    const na = nMap[a], nb = nMap[b];
    const ax = na.x + na.w / 2, ay = na.y + na.h / 2;
    const bx = nb.x + nb.w / 2, by = nb.y + nb.h / 2;
    // find closest edge points
    let x1 = ax, y1 = ay, x2 = bx, y2 = by;
    if (na.x === nb.x) { // vertical
      if (ay < by) { y1 = na.y + na.h; y2 = nb.y; } else { y1 = na.y; y2 = nb.y + nb.h; }
    } else if (na.y === nb.y) { // horizontal
      if (ax < bx) { x1 = na.x + na.w; x2 = nb.x; } else { x1 = na.x; x2 = nb.x + nb.w; }
    }
    return `
      <g>
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#6b695f" stroke-width="1" marker-end="url(#arr)"/>
        <text x="${(x1+x2)/2 + 4}" y="${(y1+y2)/2 - 4}" font-family="JetBrains Mono" font-size="8"
              letter-spacing="0.5" fill="#6b695f">${label}</text>
      </g>
    `;
  }).join('');

  return `
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#6b695f"/>
      </marker>
    </defs>
    ${edgeSvg}
    ${nodeSvg}
  `;
}

  render();

function initMapView() {
  const el = document.getElementById('ol-map');
  if (!el || typeof ol === 'undefined') return;

  const cases = Store.cases.filter(c => c.lat && c.lon);
  const features = cases.map(c => caseToFeature(c));

  const vectorSource = new ol.source.Vector({ features });
  const vectorLayer  = new ol.layer.Vector({
    source: vectorSource,
    style: feat => markerStyle(feat.get('status'))
  });

  const map = new ol.Map({
    target: el,
    layers: [
      new ol.layer.Tile({ source: new ol.source.OSM(), className: 'ol-tile-layer' }),
      vectorLayer
    ],
    view: new ol.View({
      center: ol.proj.fromLonLat([-95, 39]),
      zoom: 4
    }),
    controls: ol.control.defaults.defaults({ attributionOptions: { collapsible: true }})
  });

  window.__mapInstance = map;
  window.__mapVectorSource = vectorSource;

  // fit to current case set if we have any
  if (features.length) {
    const extent = vectorSource.getExtent();
    if (extent && isFinite(extent[0])) {
      map.getView().fit(extent, { padding: [60, 60, 60, 60], maxZoom: 8, duration: 400 });
    }
  }

  const popup = document.getElementById('map-popup');
  const popupOverlay = new ol.Overlay({ element: popup, stopEvent: true });
  map.addOverlay(popupOverlay);
  window.__mapPopupOverlay = popupOverlay;

  // click handler — either show popup or place new pin
  map.on('click', evt => {
    if (mapState.clickToAddMode) {
      const [lon, lat] = ol.proj.toLonLat(evt.coordinate);
      mapState.pendingLat = lat;
      mapState.pendingLon = lon;
      mapState.clickToAddMode = false;
      openNewCaseFromMap(lat, lon);
      return;
    }
    const feat = map.forEachFeatureAtPixel(evt.pixel, f => f);
    if (feat) {
      const c = feat.get('case');
      if (c) showMapPopup(c, evt.coordinate);
    } else {
      hideMapPopup();
    }
  });

  // pointer cursor over features
  map.on('pointermove', evt => {
    if (mapState.clickToAddMode) {
      el.style.cursor = 'crosshair';
      return;
    }
    const hit = map.hasFeatureAtPixel(evt.pixel);
    el.style.cursor = hit ? 'pointer' : '';
  });

  // resize handling
  window.addEventListener('resize', () => map.updateSize());
}

function caseToFeature(c) {
  const f = new ol.Feature({
    geometry: new ol.geom.Point(ol.proj.fromLonLat([c.lon, c.lat])),
    case: c, status: c.status, caseId: c.id
  });
  f.setId(c.id);
  return f;
}

function markerStyle(status) {
  const colors = {
    DRAFT:            '#8a8778',
    PENDING_APPROVAL: '#a16207',
    OPEN:             '#2f6f3a',
    SUSPENDED:        '#a5332a',
    CLOSURE_REVIEW:   '#22407a',
    CLOSED:           '#3a327a',
    ARCHIVED:         '#4b4a46'
  };
  const color = colors[status] || '#6b695f';
  const isDark = document.documentElement.classList.contains('dark');
  return new ol.style.Style({
    image: new ol.style.Circle({
      radius: 8,
      fill: new ol.style.Fill({ color }),
      stroke: new ol.style.Stroke({ color: isDark ? '#1a1916' : '#ffffff', width: 2.5 })
    })
  });
}

function flyToCase(caseId) {
  const c = Store.cases.find(x => x.id === caseId);
  if (!c || !c.lat || !c.lon) return;

  const coord = ol.proj.fromLonLat([c.lon, c.lat]);
  map.getView().animate({ center: coord, zoom: 11, duration: 700 });
  setTimeout(() => showMapPopup(c, coord), 750);
}

function previewMapCaseNumber() {
  const f = document.getElementById('map-new-case-form');
  if (!f) return;
  const cls = f.classification.value;

  if (cls && off) {
    const serial = nextSerial(cls, off);
    preview.textContent = `${cls}-${off}-${String(serial).padStart(5,'0')}`;
  } else {
    preview.textContent = '———-——-——————';
  }
}

async function reverseGeocode(lat, lon) {
  const el = document.getElementById('reverse-geocode');
  const locInput = document.getElementById('map-location-input');
  try {
    const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!resp.ok) throw new Error('geocode failed');
    const data = await resp.json();
    const label = data.display_name
      ? data.display_name.split(',').slice(0, 3).join(',').trim()
      : `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
    if (el) el.textContent = label;
    if (locInput && !locInput.value) locInput.value = label;
  } catch (e) {
    if (el) el.textContent = '(geocode unavailable — offline?)';
  }
}

function submitMapNewCase(event, lat, lon) {
  event.preventDefault();
  const f = event.target;
  const classCode = f.classification.value;
  const office = f.office.value;
  const serial = nextSerial(classCode, office);
  const tags = f.tags.value.split(',').map(t => t.trim()).filter(Boolean);

  const newCase = {
    id: uuid(),
    caseNumber: `${classCode}-${office}-${String(serial).padStart(5,'0')}`,
    classificationCode: classCode,
    originatingOffice: office,
    serialNumber: serial,
    title: f.title.value.trim(),
    synopsis: f.synopsis.value.trim() || undefined,
    status: 'DRAFT',
    tags,
    lat, lon,
    location: f.location.value.trim() || `${lat.toFixed(3)}, ${lon.toFixed(3)}`,
    assignedAgentId: Store.currentUser().username,
    createdAt: new Date().toISOString(),
    createdBy: Store.currentUser().username,
    updatedAt: new Date().toISOString(),
    workflowId: 'case-' + uuid()
  };
  Store.cases.unshift(newCase);
  audit('CREATE_CASE', 'Case', newCase.id, newCase.caseNumber, 'DRAFT created from map', {
    title: newCase.title, lat, lon
  });
  Store.save();
  closeModal();
  toast(`Case ${newCase.caseNumber} pinned at location`, 'success');
  // re-render map with new marker
  render();
}

// ── Command palette ───────────────────────────────────────────────
function openCommandPalette() {
  const modal = document.createElement('div');
  modal.id = 'modal-root';
  modal.className = 'modal-backdrop';
  modal.onclick = e => { if (e.target === modal) closeModal(); };
  modal.innerHTML = `
    <div class="modal" style="max-width:560px">
      <div class="p-4 border-b border-[var(--border)]">
        <input id="cmd-input" type="text" class="field" autofocus placeholder="Type a case #, title, or user…" oninput="renderCmdResults()">
      </div>
      <div id="cmd-results" class="max-h-80 overflow-y-auto p-2"></div>
      <div class="p-3 border-t border-[var(--border)] font-mono text-[10.5px] tracking-wider text-[color:var(--text-muted)] flex items-center gap-3">
        <span>↵ open</span><span>·</span><span>esc close</span>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  setTimeout(() => renderCmdResults(), 0);
  document.getElementById('cmd-input').addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter') {
      const first = document.querySelector('#cmd-results [data-cmd-item]');
      if (first) first.click();
    }
  });
}
function renderCmdResults() {
  const q = (document.getElementById('cmd-input')?.value || '').trim().toLowerCase();
  const box = document.getElementById('cmd-results');
  if (!box) return;
  if (!q) {
    box.innerHTML = `
      <div class="p-3 font-mono text-[11px] tracking-wider text-[color:var(--text-muted)] uppercase">RECENT</div>
      ${Store.cases.slice(0,5).map(c => cmdRow(c)).join('')}
    `;
    return;
  }
  const matches = Store.cases.filter(c =>
    c.caseNumber.toLowerCase().includes(q) || c.title.toLowerCase().includes(q) ||
    (c.tags || []).some(t => t.toLowerCase().includes(q))
  ).slice(0, 10);
  box.innerHTML = matches.length ? matches.map(c => cmdRow(c)).join('') :
    `<div class="p-6 text-center text-[color:var(--text-muted)] text-sm">No cases match "${esc(q)}"</div>`;
}
function cmdRow(c) {
  return `
    <a data-cmd-item href="#case?id=${c.id}" onclick="closeModal()"
       class="flex items-center gap-3 p-2.5 hover:bg-[var(--ink-100)] rounded">
      <span class="casenum text-[12px] w-36 flex-shrink-0">${esc(c.caseNumber)}</span>
      <span class="text-[13px] flex-1 truncate">${esc(c.title)}</span>
      <span class="badge status-${c.status}">${c.status.replace(/_/g,' ')}</span>
    </a>
  `;
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    if (Store.currentUser() && !document.getElementById('modal-root')) openCommandPalette();
  }
});
</script>

<script>
function render() {
  const app = document.getElementById('app');
  if (!Store.currentUser() && Router.route !== 'login') {
    Router.route = 'login';
  }

  let html;
  switch (Router.route) {
    case 'login':     html = viewLogin();     break;
    case 'dashboard': html = viewDashboard(); break;
    case 'cases':     html = viewCases();     break;
    case 'new-case':  html = viewNewCase();   break;
    case 'case':      html = viewCase();      break;
    case 'map':       html = viewMap();       break;
    case 'search':    html = viewSearch();    break;
    case 'workflows': html = viewWorkflows(); break;
    case 'audit':     html = viewAudit();     break;
    case 'admin':     html = viewAdmin();     break;
    default:          html = viewDashboard();
  }
  app.innerHTML = html;

  // initialize the map after the DOM is laid down
  if (Router.route === 'map') {
    setTimeout(initMapView, 20);
  }
}

// initial route
Router.fromHash();
render();
</script>

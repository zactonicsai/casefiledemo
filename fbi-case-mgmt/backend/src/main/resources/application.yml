spring:
  application:
    name: Demo Only-backend
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          time_zone: UTC
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 250MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

server:
  port: 8081
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: Demo Only-web
      use-pkce-with-authorization-code-grant: true

logging:
  level:
    gov.fbi.casemgmt: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{caseNumber:-}] %logger{36} - %msg%n"

app:
  cors:
    allowed-origins: http://localhost:4200,http://localhost
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${APP_AWS_ENDPOINT:}      # blank for real AWS, LocalStack URL locally
  s3:
    bucket: ${APP_S3_BUCKET:cms-documents}
    presigned-url-ttl-seconds: 300
  sqs:
    ingest-queue: ${APP_SQS_INGEST_QUEUE:cms-ingest-queue}
    ocr-queue: ${APP_SQS_OCR_QUEUE:cms-ocr-queue}
    dlq: cms-dlq
    max-poll: 10
  ocr:
    datapath: /usr/share/tesseract-ocr/4.00/tessdata
    languages: eng
    max-pages: 500
  conversion:
    libreoffice-path: /usr/bin/libreoffice
    temp-dir: /tmp/cms-conversion
  search:
    index-name: Demo Only-documents
  audit:
    retention-days: 2555   # 7 years (typical federal retention)

temporal:
  connection:
    target: ${TEMPORAL_SERVICE_ADDRESS:localhost:7233}
  namespace: ${TEMPORAL_NAMESPACE:default}
  workers:
    case-lifecycle:
      task-queue: case-lifecycle-queue
    document-ingest:
      task-queue: document-ingest-queue

---
spring:
  config:
    activate:
      on-profile: docker
logging:
  level:
    gov.fbi.casemgmt: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/casemgmt
    username: cms
    password: cms_dev_password
  elasticsearch:
    uris: http://localhost:9200
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/Demo Only
